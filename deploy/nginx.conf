# Nginx para PAC Download — proxy reverso + SSL Let's Encrypt
#
# Antes do primeiro `docker compose up`, esta config precisa funcionar em HTTP-only
# para o certbot conseguir validar. Após gerar os certificados, descomente os blocos
# 443 abaixo e reinicie o nginx:
#   docker compose restart nginx
#
# Subdomínios esperados:
#   app.SEUDOMINIO.com.br  →  frontend (Next.js)
#   api.SEUDOMINIO.com.br  →  backend (FastAPI)

# --- Redirect HTTP → HTTPS (depois que tem certificado) ---
server {
    listen 80;
    server_name app.SEUDOMINIO.com.br api.SEUDOMINIO.com.br;

    # Necessário para o certbot validar (HTTP-01 challenge)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Após gerar certificado, descomentar para forçar HTTPS:
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # Antes de ter SSL, comportamento direto:
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ============================================================
# DESCOMENTE OS BLOCOS ABAIXO APÓS GERAR OS CERTIFICADOS:
#   docker compose run --rm certbot certonly --webroot -w /var/www/certbot \
#     -d app.SEUDOMINIO.com.br -d api.SEUDOMINIO.com.br \
#     --email seu@email.com --agree-tos --no-eff-email
# ============================================================

